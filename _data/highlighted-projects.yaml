- title: BayesFlow
  subtitle: Generative AI for Computational Statistics
  image: images/projects/bayesflow.png
  link: https://bayesflow.org/
  description: > 
    BayesFlow is a Python library for simulation-based inference with generative AI. 
    It provides users and researchers with a user-friendly API for rapid Bayesian workflows,
    a rich collection of neural architectures, and multi-backend support via Keras3.
  repo: bayesflow-org/bayesflow
  tags:
    - software
    - Bayesian workflow

- title: Bayesify
  subtitle: Guiding Principled Bayesian Workflows
  image: images/projects/bayesify.png
  link: https://bayesify.org
  description: >
    Bayesify is a multi-stage agentic AI framework for evaluating the integrity of Bayesian workflows. 
    Backed by curated rubrics from the methodological literature, it grades your paper step by step and 
    helps you bring your workflow to the gold standard.
  tags:
    - software
    - app
    - agentic AI


- title: CogFormer
  subtitle: Amortizing Cognitive Modeling
  image: images/projects/cogformer.png
  link: https://jerrymhuang--cogformer-demo-web.modal.run/
  description: >
    CogFormer is the first incarnation of the BayesGPT project, allowing cognitive modelers to
    perform near-instant Bayesian modeling on a combinatorial space of design configurations.
    The web app lets you interact with a pre-trained version of CogFormer v1.
  tags:
    - software
    - app