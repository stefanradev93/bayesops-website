- title: BayesFlow
  subtitle: Generative AI for Computational Statistics
  image: images/projects/bayesflow.png
  link: https://bayesflow.org/
  description: > 
    BayesFlow is a Python library for simulation-based inference with generative AI. 
    It provides users and researchers with a user-friendly API for rapid Bayesian workflows,
    a rich collection of neural architectures, and multi-backend support via Keras3.
  repo: bayesflow-org/bayesflow
  tags:
    - software
    - Bayesian workflow

- title: BayesGPT
  subtitle: Amortizing Cognitive Modeling
  image: images/projects/bayesgpt.png
  link: https://www.nsf.gov/awardsearch/show-award?AWD_ID=2448380
  description: >
    We are developing neural networks that will allow researchers to fit thousands of cognitive 
    models. The project's focus on robust inference and benchmarking
    aims to strenghten the emerging infrastructure for model-based analysis in the behavioral sciences.
  tags:
    - award


- title: Bayesify
  subtitle: Guiding Principled Bayesian Workflows
  image: images/projects/bayesify.png
  link: https://bayesify.org
  description: >
    Bayesify is a multi-stage agentic AI framework for evaluating the integrity of Bayesian workflows. 
    Backed by curated rubrics from the methodological literature, 
    it grades your paper step by step and helps you bring your workflow to the gold standard.
  tags:
    - software
    - Bayesian workflow
    - agentic AI


- title: CogFormer
  subtitle: Learn All Your Models Once
  image: images/projects/cogformer.png
  link: https://jerrymhuang--cogformer-demo-web.modal.run/
  description: >
    CogFormer is a generative AI framework for fitting thousands of cognitive models all at once.
    Leveraging the power of transformer, CogFormer can accelerate cognitive modeling workflow by
    adapting to changing modeling assumptions, all with one transformer.
  tags:
    - cognitive modeling
    - Bayesian workflow